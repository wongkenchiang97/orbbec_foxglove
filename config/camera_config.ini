# Orbbec Foxglove Bridge configuration
# Format: key=value
# Lines starting with # or ; are comments.

host=0.0.0.0
port=8765

# Color stream
color_width=1280
color_height=720
color_fps=30

# Depth stream
depth_enabled=1
# When enabled, require FrameSet to contain both color+depth only.
# This enables pipeline frame sync and strict aggregation mode.
sync_color_depth_only=1
depth_width=1280
depth_height=720
depth_fps=30

# IMU sample rate (Hz). 0 means SDK default/auto.
# Valid rates are mapped to nearest supported value:
# 1.5625, 3.125, 6.25, 12.5, 25, 50, 100, 200, 400, 500, 800,
# 1000, 2000, 4000, 8000, 16000, 32000
imu_accel_hz=1000
imu_gyro_hz=1000

frame_id=camera_color_optical_frame
depth_frame_id=camera_depth_optical_frame
